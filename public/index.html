<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Machina — AI Brand Agent</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237B61FF'/><text x='16' y='22' text-anchor='middle' font-size='18' font-weight='800' fill='white' font-family='sans-serif'>B</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&family=Montserrat:wght@400;500;700&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&family=Libre+Baskerville:wght@400;700&family=Outfit:wght@400;500;600;700&family=Bricolage+Grotesque:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root { height: 100%; overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
// Load external JSX and compile with Babel
fetch('./app.jsx')
  .then(r => r.text())
  .then(code => {
    var fullCode = 'const { useState, useEffect, useRef, useCallback } = React;\n' + code + '\nconst root = ReactDOM.createRoot(document.getElementById("root"));\nroot.render(React.createElement(BrandMachina));';
    var compiled = Babel.transform(fullCode, { presets: ['react'] }).code;
    var script = document.createElement('script');
    script.textContent = compiled;
    document.body.appendChild(script);
  })
  .catch(err => {
    document.getElementById('root').innerHTML = '<div style="padding:40px;color:red;font-family:monospace"><h2>Build Error</h2><pre>' + err.message + '</pre></div>';
  });
</script>
</body>
</html>
